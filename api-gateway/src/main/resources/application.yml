server:
  port: 8080


spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**,/auth/**
          filters:
            - TokenRelay=
        - id: order-service
          uri: http://order-service:8085
          predicates:
            - Path=/api/orders/**
          filters:
            - TokenRelay=

logging:
  level:
    com.oz.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO

# Actuator endpoints для мониторинга
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always