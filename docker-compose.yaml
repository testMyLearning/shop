networks:
  net:
    name: network
    driver: bridge

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      # Включаем режим KRaft и задаем роли
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Настройка портов: 9092 для приложений, 9093 для контроллера
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # Генерируем ID кластера (обязательно для KRaft)
      - KAFKA_OFFLOG_DIRS=/tmp/kraft-combined-logs
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
    ports:
      - "9092:9092"
    networks:
      - net

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8082
    ports:
      - "8082:8082"
    command: start-dev
    volumes:
      - ./keycloak-data:/opt/keycloak/data
    networks:
      - net
  database:
    image: postgres:15.8
    command: postgres -p 5555 -c max_connections=200 -c shared_buffers=256MB
    container_name: database_all
    environment:
        POSTGRES_DB: postgres_db
        POSTGRES_USER: postgres        # ← ОБЯЗАТЕЛЬНО!
        POSTGRES_PASSWORD: postgres
    ports:
        - "5555:5555"
    volumes:
        - postgres-data:/var/lib/postgresql/data
    networks:
      - net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6380:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - net




volumes:
  keycloak_data:
  redis_data:
  postgres-data: