networks:
  net:
    name: network
    driver: bridge

services:
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8082
    ports:
      - "8082:8082"
    command: start-dev
    volumes:
      - ./keycloak-data:/opt/keycloak/data
    networks:
      - net
  database:
    image: postgres:15.8
    command: postgres -p 5555
    container_name: database_all
    environment:
        POSTGRES_DB: postgres_db
        POSTGRES_USER: postgres        # ← ОБЯЗАТЕЛЬНО!
        POSTGRES_PASSWORD: postgres
    ports:
        - "5555:5555"
    volumes:
        - postgres-data:/var/lib/postgresql/data
    networks:
      - net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - net



volumes:
  keycloak_data:
  redis_data:
  postgres-data: