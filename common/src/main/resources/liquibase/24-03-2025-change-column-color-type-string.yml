databaseChangeLog:
  - changeSet:
      id: 2026-03-24-fix-color-column-type
      author: "Vladimir Radionov"
      changes:
        # 1. Удаляем колонку с неправильным типом (int2)
        - dropColumn:
            tableName: products
            columnName: color
        # 2. Создаем её заново с правильным типом (varchar)
        - addColumn:
            tableName: products
            columns:
              - column:
                  name: color
                  type: varchar(255)
                  constraints:
                    nullable: true